{% extends 'base.html' %}{% block content %}<form method="post" class="form-card"><h1 class="font-serif text-4xl">{{ 'Edit Chapter' if chapter else 'Create Chapter' }}</h1><p class="text-[#738A6E]">Novel: {{ novel.title }}</p><input name="title" value="{{ chapter.title if chapter else '' }}" placeholder="Chapter Title" class="input" required><input name="chapter_number" type="number" value="{{ chapter.chapter_number if chapter else '' }}" placeholder="Chapter Number" class="input" required><input name="youtube_url" value="{{ chapter.youtube_url if chapter else '' }}" placeholder="Optional YouTube URL" class="input"><textarea name="content" placeholder="Write or paste chapter here..." class="input h-[520px] font-serif leading-8" required>{{ chapter.content if chapter else '' }}</textarea><label><input type="checkbox" name="is_published" {% if chapter and chapter.is_published %}checked{% endif %}> Published</label><button class="btn-main">Save Chapter</button></form>{% endblock %}
